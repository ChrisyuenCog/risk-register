name: CI
on:
  push:
    branches: [main]
  pull_request:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx prisma validate
      - run: npx prisma generate
      - run: npm test
      - run: npm run build
        env:
          DATABASE_URL: "postgresql://app:app@localhost:5432/riskregister"
