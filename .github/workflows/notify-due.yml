# Daily due-action reminders. Requires secrets: DATABASE_URL, SMTP_HOST,
# SMTP_PORT, SMTP_USER, SMTP_PASS, MAIL_FROM. Optional repo variable:
# APP_URL (used for links in the emails). Skips cleanly if SMTP_HOST is
# not configured yet.
name: Due-action reminders
on:
  schedule:
    - cron: "0 7 * * 1-5"   # 07:00 UTC, weekdays
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_PORT: ${{ secrets.SMTP_PORT }}
      SMTP_USER: ${{ secrets.SMTP_USER }}
      SMTP_PASS: ${{ secrets.SMTP_PASS }}
      MAIL_FROM: ${{ secrets.MAIL_FROM }}
      APP_URL: ${{ vars.APP_URL }}
    steps:
      - name: Check configuration
        id: cfg
        run: |
          if [ -z "$SMTP_HOST" ] || [ -z "$DATABASE_URL" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "SMTP or database secrets not set - skipping."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/checkout@v4
        if: steps.cfg.outputs.configured == 'true'
      - uses: actions/setup-node@v4
        if: steps.cfg.outputs.configured == 'true'
        with:
          node-version: 22
      - name: Install
        if: steps.cfg.outputs.configured == 'true'
        run: npm ci
      - name: Send reminders
        if: steps.cfg.outputs.configured == 'true'
        run: npx tsx scripts/notify-due.ts
