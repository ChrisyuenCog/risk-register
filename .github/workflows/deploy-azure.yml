# Manual deployment to Azure App Service.
# One-time setup is documented in docs/DEPLOYMENT-AZURE.md:
#   - repository variable AZURE_WEBAPP_NAME
#   - secret AZURE_WEBAPP_PUBLISH_PROFILE (from the App Service)
#   - secret DATABASE_URL (Azure PostgreSQL connection string, used to
#     apply migrations before deploying; omit to run migrations manually)
name: Deploy to Azure App Service
on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install and build
        run: |
          npm ci
          npm run build

      - name: Apply database migrations
        if: ${{ secrets.DATABASE_URL != '' }}
        run: npx prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Package
        run: zip -qr app.zip .next public package.json package-lock.json next.config.mjs node_modules prisma -x ".next/cache/*"

      - name: Deploy
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ vars.AZURE_WEBAPP_NAME }}
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: app.zip
