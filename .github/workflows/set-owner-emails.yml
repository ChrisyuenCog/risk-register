# One-off (safe to re-run): backfill mitigation-action owner emails from
# the agreed owner->email mapping. Only fills blanks; never overwrites.
name: Backfill action owner emails
on:
  workflow_dispatch:

jobs:
  backfill:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npx tsx scripts/set-owner-emails.ts
